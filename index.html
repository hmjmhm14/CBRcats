<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Выживание</title>
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; display: flex; flex-direction: column; min-height: 100vh; }
        header { width: 100%; background: linear-gradient(to bottom, #1a0000, #050505); border-bottom: 3px solid #ff0000; padding: 40px 0; text-align: center; }
        .main-content { flex: 1; display: flex; justify-content: center; padding: 40px; gap: 50px; flex-wrap: wrap; }
        .auth-card { width: 380px; background: #000; border: 1px solid #333; padding: 30px; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #555; text-transform: uppercase; font-weight: bold; }
        .tab.active { color: #ffcc00; border-bottom: 2px solid #ffcc00; }
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: #fff; margin-bottom: 15px; outline: none; }
        .action-btn { width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .universe-static { padding: 12px; background: #0a0a0a; border: 1px dashed #444; color: #ffcc00; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <header><img src="https://i.ibb.co/7xsmywvY/image.avif" style="max-width:500px;"></header>
    <div class="main-content">
        <div class="auth-card">
            <div id="step-1">
                <div class="tabs">
                    <div class="tab active" id="tab-login" onclick="setMode(true)">Вход</div>
                    <div class="tab" id="tab-reg" onclick="setMode(false)">Регистрация</div>
                </div>
                <input type="email" id="email" placeholder="Почта">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="action-btn" id="submit-btn" onclick="handleStep1()">ВОЙТИ В МИР</button>
            </div>
            <div id="step-2" style="display: none;">
                <h2 style="color:#ffcc00; text-align:center;">СОЗДАНИЕ ПЕРСОНАЖА</h2>
                <div class="universe-static">Хранители Леса</div>
                <input type="text" id="cat-name" placeholder="Имя кота">
                <select id="cat-gender"><option value="кот">Кот</option><option value="кошка">Кошка</option></select>
                <button class="action-btn" onclick="finishRegistration()">ЗАВЕРШИТЬ</button>
            </div>
        </div>
    </div>
    <script>
        let isLogin = true; let tempAuthData = {};
        function setMode(l) { isLogin = l; document.getElementById('tab-login').classList.toggle('active', l); document.getElementById('tab-reg').classList.toggle('active', !l); document.getElementById('submit-btn').innerText = l ? 'ВОЙТИ В МИР' : 'ПРОДОЛЖИТЬ'; }
        function handleStep1() {
            const e = document.getElementById('email').value; const p = document.getElementById('pass').value;
            if (!e || !p) return alert("Заполните поля!");
            if (isLogin) {
                const data = JSON.parse(localStorage.getItem('cbrcat_user_data'));
                if (data && data.email === e && data.password === p) { window.location.href = 'profile.html'; }
                else { alert("Ошибка входа!"); }
            } else { tempAuthData = { e, p }; document.getElementById('step-1').style.display = 'none'; document.getElementById('step-2').style.display = 'block'; }
        }
        function finishRegistration() {
            const n = document.getElementById('cat-name').value; const g = document.getElementById('cat-gender').value;
            if (!n) return alert("Введите имя!");
            let count = parseInt(localStorage.getItem('cbrcat_id_counter') || "0");
            let newID = (Math.floor(count/100)).toString().padStart(2,'0') + "." + (count%100).toString().padStart(2,'0');
            const profile = { id: newID, email: tempAuthData.e, password: tempAuthData.p, name: n, gender: g, tribe: "Одиночки", appearance: "", birthday: new Date().toLocaleDateString(), about: "История...", status: count === 0 ? "admin" : "player" };
            localStorage.setItem('cbrcat_user_data', JSON.stringify(profile));
            localStorage.setItem('cbrcat_id_counter', (count + 1).toString());
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
