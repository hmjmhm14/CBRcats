<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBRcats — Вход в мир</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0a0a0a; color: #d1d1d1;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .auth-container {
            width: 350px; background: #000;
            border: 2px solid #ffcc00; border-radius: 12px;
            padding: 30px; box-shadow: 0 0 20px rgba(255, 204, 0, 0.1);
            text-align: center;
        }

        header img { max-width: 200px; margin-bottom: 20px; }
        h2 { color: #ffcc00; font-size: 1.2em; margin-bottom: 20px; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75em; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 12px; background: #080808;
            border: 1px solid #333; color: #fff; border-radius: 4px;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ffcc00; }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        button {
            width: 100%; padding: 12px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .login-btn { background: #ffcc00; color: #000; }
        .login-btn:hover { background: #ffe066; }

        .reg-btn { background: transparent; color: #ffcc00; border: 1px solid #ffcc00; }
        .reg-btn:hover { background: rgba(255, 204, 0, 0.1); }

        .toggle-link { margin-top: 15px; display: block; font-size: 0.8em; color: #444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <header>
            <img src="https://i.ibb.co/7xsmywvY/image.avif" alt="CBRcats">
        </header>
        
        <h2 id="auth-title">Авторизация</h2>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="cat@cbr.com">
        </div>

        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <div id="reg-fields" style="display: none;">
            <div class="input-group">
                <label>Повтор пароля</label>
                <input type="password" id="confirm-pass" placeholder="••••••••">
            </div>
        </div>

        <div class="btn-stack">
            <button class="login-btn" id="main-action-btn" onclick="handleAuth()">ВОЙТИ</button>
            <button class="reg-btn" id="toggle-btn" onclick="toggleMode()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Авторизация' : 'Регистрация';
            document.getElementById('reg-fields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('main-action-btn').innerText = isLoginMode ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'СОЗДАТЬ АККАУНТ' : 'У МЕНЯ ЕСТЬ АККАУНТ';
        }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if (!email || !pass) return alert("Заполните поля!");

            if (isLoginMode) {
                // --- ЛОГИКА ВХОДА ---
                const data = JSON.parse(localStorage.getItem('cbrcat_user_data'));
                if (data && data.email === email && data.password === pass) {
                    window.location.href = 'Профиль/profile.html';
                } else {
                    alert("Неверный логин или пароль!");
                }
            } else {
                // --- ЛОГИКА РЕГИСТРАЦИИ ---
                const confirm = document.getElementById('confirm-pass').value;
                if (pass !== confirm) return alert("Пароли не совпадают!");

                // Берем счетчик из памяти
                let count = parseInt(localStorage.getItem('cbrcat_id_counter') || "0");
                
                // Форматируем ID (0 -> 00.00)
                let main = Math.floor(count / 100).toString().padStart(2, '0');
                let sub = (count % 100).toString().padStart(2, '0');
                let newID = `${main}.${sub}`;

                const newProfile = {
                    id: newID,
                    email: email,
                    password: pass,
                    name: count === 0 ? "Разработчик" : "Частокол",
                    appearance: "",
                    isReady: false, // Обязательно false, чтобы заставить выбрать окрас
                    tribe: "Одиночки",
                    gender: "кот",
                    birthday: new Date().toLocaleDateString(),
                    about: "История выживания..."
                };

                localStorage.setItem('cbrcat_user_data', JSON.stringify(newProfile));
                localStorage.setItem('cbrcat_id_counter', (count + 1).toString());

                alert("Регистрация успешна! Ваш ID: " + newID);
                window.location.href = 'Профиль/profile.html';
            }
        }
    </script>
</body>
</html>
