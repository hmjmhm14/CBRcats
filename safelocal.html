<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"></head>
<body>
<script>
    const CONFIG = {
        storageKey: 'cbrcat_user_data',
        counterKey: 'cbrcat_id_counter'
    };

    function formatPlayerID(num) {
        let main = Math.floor(num / 100).toString().padStart(2, '0');
        let sub = (num % 100).toString().padStart(2, '0');
        return `${main}.${sub}`;
    }

    // Инициализация при первом посещении сайта
    (function init() {
        if (!localStorage.getItem(CONFIG.counterKey)) {
            localStorage.setItem(CONFIG.counterKey, "0");
        }
    })();

    // Функция регистрации нового игрока
    window.registerNewUser = function(email, password) {
        let idCount = parseInt(localStorage.getItem(CONFIG.counterKey));
        let newID = formatPlayerID(idCount);

        const newProfile = {
            id: newID,
            email: email,
            password: password,
            name: idCount === 0 ? "Разработчик" : "Новый Кот",
            appearance: "", // Пусто, пока не выбран окрас
            isReady: false, // Флаг доступа в игру
            tribe: "Одиночки",
            gender: "кот",
            status: idCount === 0 ? "admin" : "player"
        };

        localStorage.setItem(CONFIG.storageKey, JSON.stringify(newProfile));
        localStorage.setItem(CONFIG.counterKey, (idCount + 1).toString());
    };
</script>
</body>
</html>
