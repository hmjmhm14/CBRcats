<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Система Данных</title>
    <style>
        /* Добавил немного стилей для кнопки очистки */
        .debug-panel {
            margin: 20px;
            padding: 15px;
            border: 1px dashed #ff3333;
            background: #1a0000;
            color: #ff3333;
            font-family: monospace;
        }
        .clear-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="debug-panel">
        <h3>ПАНЕЛЬ УПРАВЛЕНИЯ БАЗОЙ</h3>
        <p>Внимание: нажатие кнопки удалит ВСЕ аккаунты и сбросит счетчик ID.</p>
        <button class="clear-btn" onclick="fullSystemReset()">ОЧИСТИТЬ ВСЕ АККАУНТЫ</button>
    </div>

    <script>
        /**
         * CBRcats ENGINE v1.2 — Исправленная система ID и локаций
         */

        const CONFIG = {
            storageKey: 'cbrcat_user_data',
            counterKey: 'cbrcat_id_counter',
            defaultAvatar: 'https://i.ibb.co/V09zmWcT/image.png'
        };

        function formatPlayerID(num) {
            let main = Math.floor(num / 100).toString().padStart(2, '0');
            let sub = (num % 100).toString().padStart(2, '0');
            return `${main}.${sub}`;
        }

        function initCBRSystem() {
            let userData = localStorage.getItem(CONFIG.storageKey);
            let idCounter = localStorage.getItem(CONFIG.counterKey);

            if (idCounter === null) {
                localStorage.setItem(CONFIG.counterKey, "0");
                idCounter = "0";
            }

            if (!userData) {
                let currentCount = parseInt(idCounter);
                let newID = formatPlayerID(currentCount);
                
                const newProfile = {
                    id: newID,
                    name: currentCount === 0 ? "Разработчик" : "Новый Кот",
                    appearance: CONFIG.defaultAvatar,
                    tribe: "Одиночки",
                    gender: "кот",
                    spawnLocID: "loc_main", // Спавн по ID локации
                    birthday: new Date().toLocaleDateString(),
                    about: "История выживания...",
                    status: currentCount === 0 ? "admin" : "player"
                };

                localStorage.setItem(CONFIG.storageKey, JSON.stringify(newProfile));
                localStorage.setItem(CONFIG.counterKey, (currentCount + 1).toString());
                console.log("CBRcats: Профиль инициализирован. ID: " + newID);
            }
        }

        /**
         * НОВАЯ ФУНКЦИЯ: Полный сброс системы
         */
        function fullSystemReset() {
            if (confirm("ВЫ УВЕРЕНЫ? Все аккаунты будут безвозвратно удалены, а счетчик ID сбросится до 00.00.")) {
                localStorage.removeItem(CONFIG.storageKey);
                localStorage.removeItem(CONFIG.counterKey);
                alert("База данных успешно очищена. Страница будет перезагружена.");
                location.reload();
            }
        }

        function updateCBRData(field, value) {
            let data = JSON.parse(localStorage.getItem(CONFIG.storageKey));
            if (data) {
                data[field] = value;
                localStorage.setItem(CONFIG.storageKey, JSON.stringify(data));
            }
        }

        function adminDeletePlayerByID(targetID) {
            if (targetID === "00.00") return alert("Нельзя удалить создателя!");
            if (confirm("Удалить данные игрока " + targetID + "?")) {
                localStorage.removeItem(CONFIG.storageKey);
                location.reload();
            }
        }

        initCBRSystem();
    </script>
</body>
</html>
