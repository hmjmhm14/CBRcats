<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Система Данных</title>
</head>
<body>
    <script>
        /**
         * CBRcats ENGINE v1.3 — Регистрация с учетом созданных племен
         */

        const CONFIG = {
            storageKey: 'cbrcat_user_data',
            counterKey: 'cbrcat_id_counter',
            tribesKey: 'cbrcat_tribes_list', // Ключ для хранения списка всех племен
            defaultAvatar: 'https://i.ibb.co/V09zmWcT/image.png'
        };

        function formatPlayerID(num) {
            let main = Math.floor(num / 100).toString().padStart(2, '0');
            let sub = (num % 100).toString().padStart(2, '0');
            return `${main}.${sub}`;
        }

        /**
         * Инициализация системы
         */
        function initCBRSystem() {
            try {
                let userData = localStorage.getItem(CONFIG.storageKey);
                let idCounter = localStorage.getItem(CONFIG.counterKey);
                
                // Получаем список созданных племен из памяти
                let existingTribes = JSON.parse(localStorage.getItem(CONFIG.tribesKey)) || [];

                if (idCounter === null) {
                    localStorage.setItem(CONFIG.counterKey, "0");
                    idCounter = "0";
                }

                if (!userData) {
                    let currentCount = parseInt(idCounter);
                    let newID = formatPlayerID(currentCount);
                    
                    // По умолчанию "Одиночки", но если есть созданные племена — берем первое из списка
                    let startTribe = "Одиночки";
                    let startSmell = "Запах пыли и свободы";

                    if (existingTribes.length > 0) {
                        startTribe = existingTribes[0].name;
                        startSmell = existingTribes[0].smell;
                    }

                    const newProfile = {
                        id: newID,
                        name: currentCount === 0 ? "Разработчик" : "Новый Кот",
                        email: "",
                        password: "",
                        appearance: CONFIG.defaultAvatar,
                        tribe: startTribe, // Подставляет созданное племя
                        smell: startSmell, // Подставляет запах этого племени
                        gender: "кот",
                        birthday: new Date().toLocaleDateString(),
                        about: "История выживания...",
                        status: currentCount === 0 ? "admin" : "player"
                    };

                    localStorage.setItem(CONFIG.storageKey, JSON.stringify(newProfile));
                    localStorage.setItem(CONFIG.counterKey, (currentCount + 1).toString());
                    console.log("CBRcats: Профиль создан с привязкой к: " + startTribe);
                }
            } catch (e) {
                console.error("Ошибка системы:", e);
            }
        }

        /**
         * Функция для панели управления: Создать новое племя в общий список
         */
        function adminCreateTribe(name, smell) {
            let tribes = JSON.parse(localStorage.getItem(CONFIG.tribesKey)) || [];
            // Проверяем, нет ли уже такого племени
            tribes = tribes.filter(t => t.name !== name); 
            tribes.push({ name: name, smell: smell });
            localStorage.setItem(CONFIG.tribesKey, JSON.stringify(tribes));
        }

        /**
         * Функция для панели управления: Удалить племя
         */
        function adminDeleteTribe(name) {
            let tribes = JSON.parse(localStorage.getItem(CONFIG.tribesKey)) || [];
            tribes = tribes.filter(t => t.name !== name);
            localStorage.setItem(CONFIG.tribesKey, JSON.stringify(tribes));
        }

        function getCBRData() {
            return JSON.parse(localStorage.getItem(CONFIG.storageKey));
        }

        initCBRSystem();
    </script>
</body>
</html>
