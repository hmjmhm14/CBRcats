<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Система Данных</title>
    <style>
        .admin-panel { padding: 20px; background: #1a0000; border: 2px solid #ff0000; color: #fff; font-family: monospace; }
        .reset-btn { background: #ff0000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h2>СИСТЕМНАЯ ПАНЕЛЬ СБРОСА</h2>
        <p>Нажми кнопку ниже, чтобы удалить все аккаунты и начать отсчет с 00.00</p>
        <button class="reset-btn" onclick="fullSystemReset()">СБРОСИТЬ ВСЮ БАЗУ (В 00.00)</button>
    </div>

    <script>
        const CONFIG = {
            storageKey: 'cbrcat_user_data',
            counterKey: 'cbrcat_id_counter',
            defaultAvatar: 'https://i.ibb.co/V09zmWcT/image.png'
        };

        // Твоя логика ID: корректно делит на 100 для перехода 00.99 -> 01.00
        function formatPlayerID(num) {
            let main = Math.floor(num / 100).toString().padStart(2, '0');
            let sub = (num % 100).toString().padStart(2, '0');
            return `${main}.${sub}`;
        }

        // Функция ПОЛНОГО удаления старых данных
        function fullSystemReset() {
            if (confirm("ВНИМАНИЕ: Это удалит твой профиль и сбросит счетчик регистраций. Продолжить?")) {
                localStorage.clear(); // Полная очистка LocalStorage
                alert("База очищена! Теперь при регистрации ты получишь ID 00.00.");
                location.reload();
            }
        }

        function initCBRSystem() {
            let userData = localStorage.getItem(CONFIG.storageKey);
            let idCounter = localStorage.getItem(CONFIG.counterKey);

            if (idCounter === null) {
                localStorage.setItem(CONFIG.counterKey, "0");
                idCounter = "0";
            }

            if (!userData) {
                let currentCount = parseInt(idCounter);
                let newID = formatPlayerID(currentCount);
                
                const newProfile = {
                    id: newID,
                    name: currentCount === 0 ? "Разработчик" : "Новый Кот",
                    appearance: CONFIG.defaultAvatar,
                    tribe: "Одиночки",
                    gender: "кот",
                    spawnLocID: "loc_main",
                    birthday: new Date().toLocaleDateString(),
                    about: "История выживания...",
                    status: currentCount === 0 ? "admin" : "player"
                };

                localStorage.setItem(CONFIG.storageKey, JSON.stringify(newProfile));
                localStorage.setItem(CONFIG.counterKey, (currentCount + 1).toString());
                console.log("CBRcats: Создан профиль. Ваш ID: " + newID);
            }
        }

        initCBRSystem();
    </script>
</body>
</html>
