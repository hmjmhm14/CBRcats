<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBRcats — Профиль персонажа</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        .profile-wrapper {
            width: 95vw;
            max-width: 1000px;
            margin: 50px auto;
            background: #000;
            border: 2px solid #ffcc00;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .profile-header h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .exit-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            font-family: inherit;
        }

        .exit-btn:hover {
            background: #ff3333;
            color: #fff;
        }

        .main-content {
            display: flex;
            gap: 30px;
        }

        .left-col {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .avatar-box {
            width: 300px;
            height: 350px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #profile-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .select-btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
            transition: 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .select-btn:hover {
            background: #e6b800;
            transform: translateY(-2px);
        }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-btn {
            background: #111;
            color: #888;
            border: 1px solid #222;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
            text-decoration: none;
        }

        .menu-btn.locked {
            opacity: 0.2;
            cursor: not-allowed;
            pointer-events: none; /* Чтобы нельзя было кликнуть на заблокированную */
        }

        .menu-btn:not(.locked):hover {
            border-color: #ffcc00;
            color: #ffcc00;
            background: #151515;
        }

        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #080808;
            border-left: 3px solid #ffcc00;
            border-radius: 4px;
        }

        .info-label {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #edit-name {
            background: transparent;
            border: none;
            color: #ffcc00;
            text-align: right;
            font-weight: bold;
            font-family: inherit;
            outline: none;
            width: 250px;
        }

        .about-section {
            background: #080808;
            border: 1px solid #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: 4px;
        }

        .toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .bb-btn {
            background: #151515;
            border: 1px solid #333;
            color: #777;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.7em;
            transition: 0.2s;
        }

        .bb-btn:hover {
            border-color: #666;
            color: #fff;
        }

        .about-area {
            width: 100%;
            height: 150px;
            background: #050505;
            border: 1px solid #333;
            color: #bbb;
            padding: 15px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            font-size: 0.9em;
            line-height: 1.5;
        }

        /* --- МОДАЛЬНЫЕ ОКНА --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-win {
            background: #000;
            border: 2px solid #ffcc00;
            width: 650px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .settings-input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            margin-top: 5px;
            font-family: inherit;
        }

        .chat-container {
            height: 200px;
            overflow-y: auto;
            background: #050505;
            border: 1px solid #222;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .pm-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .pm-tab {
            flex: 1;
            padding: 5px;
            background: #111;
            border: 1px solid #333;
            color: #555;
            cursor: pointer;
            text-align: center;
            font-size: 0.75em;
        }

        .pm-tab.active {
            color: #ffcc00;
            border-color: #ffcc00;
        }
        
        /* Стили для новых тегов чата */
        .chat-tag-btn {
            background: #111;
            border: 1px solid #ffcc00;
            color: #ffcc00;
            padding: 3px 8px;
            font-size: 0.7em;
            cursor: pointer;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header class="profile-header">
            <h1 id="header-name">ЗАГРУЗКА...</h1>
            <button class="exit-btn" onclick="exitWithoutSave()">ВЫЙТИ</button>
        </header>

        <div class="main-content">
            <div class="left-col">
                <div class="avatar-box">
                    <span id="no-skin" style="color:#222; font-size:0.8em; letter-spacing:1px;">ОКРАС НЕ ВЫБРАН</span>
                    <img id="profile-img" src="">
                </div>
                
                <a href="okras.html" id="btn-okras" class="select-btn">ВЫБРАТЬ ОКРАС</a>

                <div class="menu-btns">
                    <a href="game.html" id="link-game" class="menu-btn locked">ИГРОВАЯ</a>
                    <div class="menu-btn locked" onclick="openModal('chat')">ОБЩИЙ ЧАТ</div>
                    <div class="menu-btn locked" onclick="openModal('pm')">ЛИЧНЫЕ СООБЩЕНИЯ</div>
                    <div class="menu-btn locked" onclick="openModal('settings')">НАСТРОЙКИ</div>
                    <div class="menu-btn locked" onclick="openModal('news')">НОВОСТИ</div>
                    <div class="menu-btn admin-btn" id="link-admin" style="display:none; color:#ff3333; border-color:#ff3333;" onclick="openModal('admin')">ПАНЕЛЬ ПЕРСОНАЛА</div>
                </div>
            </div>

            <div class="right-col">
                <div class="info-row">
                    <span class="info-label">ID</span>
                    <span id="display-id" style="color:#ffcc00; font-weight:bold; letter-spacing:1px;">--.--</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Имя (пробел)</span>
                    <input type="text" id="edit-name" spellcheck="false">
                </div>

                <div class="info-row" id="row-gender">
                    <span class="info-label">Пол</span>
                    <span id="display-gender" style="color:#fff;">--</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Фракция</span>
                    <span id="display-tribe" style="color:#00ffcc;">Одиночки</span>
                </div>

                <div class="about-section">
                    <div class="toolbar">
                        <button class="bb-btn" onclick="insertBB('[b]','[/b]')">B</button>
                        <button class="bb-btn" onclick="insertBB('[i]','[/i]')">I</button>
                        <button class="bb-btn" onclick="insertBB('[u]','[/u]')">U</button>
                        <button class="bb-btn" onclick="insertBB('[img]','[/img]')">IMG</button>
                    </div>
                    <textarea id="edit-about" class="about-area" placeholder="Напишите историю вашего персонажа..."></textarea>
                    <button class="select-btn" style="background:transparent; border:1px solid #4caf50; color:#4caf50; font-size:0.8em; padding:8px;" onclick="saveAboutData()">СОХРАНИТЬ ИСТОРИЮ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-chat" class="modal">
        <div class="modal-win">
            <div class="modal-header"><h2>ЧАТЫ</h2><button class="bb-btn" onclick="closeModal('chat')">X</button></div>
            <div style="background:#0a0a0a; padding:10px; border:1px solid #222; margin-bottom:10px;">
                <input type="text" id="new-chat-name" class="settings-input" placeholder="Название чата">
                <select id="new-chat-mode" class="settings-input" style="margin-top:5px;">
                    <option value="group">Группа (все пишут)</option>
                    <option value="channel">Канал (только владелец)</option>
                </select>
                <button class="select-btn" style="margin-top:10px; padding:8px; font-size:0.7em;" onclick="initChat()">СОЗДАТЬ</button>
            </div>
            <div id="my-chats-list" style="display:flex; flex-wrap:wrap; margin-bottom:5px;"></div>
            <div class="chat-container" id="global-chat-box"></div>
            <div id="chat-owner-panel" style="display:none; border-top:1px solid #333; padding-top:10px;">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-admin-target" class="settings-input" style="width:100px; margin:0" placeholder="ID игрока">
                    <button class="bb-btn" onclick="chatAdminAction('transfer')">ПРАВА</button>
                    <button class="bb-btn" onclick="chatAdminAction('kick')">КИК</button>
                    <button class="bb-btn" style="color:#ff3333" onclick="chatAdminAction('delete')">УДАЛИТЬ</button>
                </div>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="chat-input" class="settings-input" style="margin:0" placeholder="Сообщение...">
                <button class="bb-btn" onclick="sendChatMessage()">></button>
            </div>
        </div>
    </div>

    <div id="modal-pm" class="modal">
        <div class="modal-win">
            <div class="modal-header"><h2>ЛИЧНЫЕ СООБЩЕНИЯ</h2><button class="bb-btn" onclick="closeModal('pm')">X</button></div>
            <div class="pm-tabs">
                <div class="pm-tab active" onclick="loadPMs('inbox', this)">ПОЛУЧАТЕЛЬ</div>
                <div class="pm-tab" onclick="loadPMs('sent', this)">ОТПРАВИТЕЛЬ</div>
            </div>
            <div id="pm-display-list" style="height:150px; overflow-y:auto; background:#050505; border:1px solid #222; padding:10px; font-size:0.85em;"></div>
            <div style="margin-top:10px;">
                <input type="text" id="pm-to-id" class="settings-input" placeholder="ID получателя">
                <textarea id="pm-body-text" class="about-area" style="height:60px; margin-top:5px;" placeholder="Текст сообщения..."></textarea>
                <button class="select-btn" style="padding:8px; font-size:0.7em; margin-top:5px;" onclick="processPM()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-win">
            <div class="modal-header"><h2>НАСТРОЙКИ АККАУНТА</h2><button class="bb-btn" onclick="closeModal('settings')">X</button></div>
            <label class="info-label">Почта (E-mail):</label>
            <input type="email" id="set-email" class="settings-input">
            <label class="info-label" style="margin-top:10px; display:block;">Пароль:</label>
            <input type="password" id="set-pass" class="settings-input">
            <button class="select-btn" style="margin-top:20px;" onclick="saveSettings()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data'));
        let activeChat = { owner: null, type: 'group', tribe: 'Одиночки', title: '' };

        window.onload = function() {
            if (!userData) { window.location.href = 'index.html'; return; }
            refreshProfile();
        };

        function refreshProfile() {
            const genderRow = document.getElementById('row-gender');
            if (userData.id) { 
                genderRow.style.display = 'none'; 
            } else {
                genderRow.style.display = 'flex';
                document.getElementById('display-gender').innerText = userData.gender || "Не указан";
            }

            document.getElementById('display-id').innerText = userData.id;
            document.getElementById('header-name').innerText = userData.name.toUpperCase();
            document.getElementById('display-tribe').innerText = userData.tribe;
            document.getElementById('edit-name').value = userData.name;
            document.getElementById('set-email').value = userData.email || "";
            document.getElementById('edit-about').value = userData.about || "";

            // ИСПРАВЛЕНИЕ: Разблокируем "ИГРОВУЮ", если есть окрас
            if (userData.appearance) {
                const img = document.getElementById('profile-img');
                img.src = userData.appearance;
                img.style.display = 'block';
                document.getElementById('no-skin').style.display = 'none';
                document.getElementById('btn-okras').style.display = 'none';
                
                // Снимаем блокировку со всех кнопок меню
                document.querySelectorAll('.menu-btn.locked').forEach(btn => btn.classList.remove('locked'));
            }

            if(userData.id === "00.00") {
                document.getElementById('link-admin').style.display = 'block';
            }
        }

        function initChat() {
            const title = document.getElementById('new-chat-name').value;
            const mode = document.getElementById('new-chat-mode').value;
            if(!title) return alert("Введите название!");
            const list = document.getElementById('my-chats-list');
            const tag = document.createElement('button');
            tag.className = 'chat-tag-btn';
            tag.innerText = title;
            tag.onclick = () => {
                activeChat.title = title;
                activeChat.type = mode;
                document.getElementById('global-chat-box').innerHTML = `<div style="color:#ffcc00; text-align:center;">--- ВЫБРАН ЧАТ: ${title} ---</div>`;
            };
            list.appendChild(tag);
            activeChat = { title: title, type: mode, owner: userData.id, tribe: userData.tribe };
            document.getElementById('global-chat-box').innerHTML = `<div style="color:#00ffcc; text-align:center;">--- ЧАТ ${title} СОЗДАН ---</div>`;
            document.getElementById('chat-owner-panel').style.display = 'block';
        }

        function sendChatMessage() {
            const inp = document.getElementById('chat-input');
            if(activeChat.type === 'channel' && userData.id !== activeChat.owner) return alert("Это канал! Писать может только владелец.");
            if(!inp.value) return;
            const msg = document.createElement('div');
            msg.style.marginBottom = '5px';
            msg.innerHTML = `<b style="color:#ffcc00">${userData.name}:</b> ${inp.value}`;
            document.getElementById('global-chat-box').appendChild(msg);
            inp.value = '';
        }

        function chatAdminAction(act) {
            const target = document.getElementById('chat-admin-target').value;
            if(act === 'delete') {
                document.getElementById('global-chat-box').innerHTML = "";
                document.getElementById('chat-owner-panel').style.display = 'none';
                document.getElementById('my-chats-list').innerHTML = "";
            } else if(act === 'transfer') {
                activeChat.owner = target;
                alert("Права переданы игроку " + target);
            } else { alert("Игрок " + target + " исключен."); }
        }

        function openModal(m) { 
            document.getElementById('modal-' + m).style.display = 'flex'; 
            if(m === 'pm') {
                loadPMs('inbox', document.querySelector('.pm-tab'));
            }
        }

        function loadPMs(tab, el) {
            document.querySelectorAll('.pm-tab').forEach(t => t.classList.remove('active'));
            if(el) el.classList.add('active');
            const box = document.getElementById('pm-display-list');
            if(tab === 'inbox') {
                box.innerHTML = `<div style="color:#4caf50">Входящие (ID ${userData.id}):</div><div style="margin-top:5px; color:#888;">Система: Добро пожаловать! Сообщений пока нет.</div>`;
            } else {
                box.innerHTML = `<div style="color:#666">Ваши исходящие сообщения пусты.</div>`;
            }
        }

        function processPM() {
            const target = document.getElementById('pm-to-id').value;
            if(!target) return alert("Укажите ID!");
            alert("Сообщение отправлено игроку " + target);
            document.getElementById('pm-body-text').value = "";
        }

        function saveSettings() {
            userData.email = document.getElementById('set-email').value;
            userData.password = document.getElementById('set-pass').value;
            localStorage.setItem('cbrcat_user_data', JSON.stringify(userData));
            alert("Настройки аккаунта обновлены!");
            closeModal('settings');
        }

        function saveAboutData() {
            userData.about = document.getElementById('edit-about').value;
            localStorage.setItem('cbrcat_user_data', JSON.stringify(userData));
            alert("История сохранена!");
        }

        function insertBB(o, c) {
            const a = document.getElementById('edit-about');
            const start = a.selectionStart;
            const end = a.selectionEnd;
            a.value = a.value.substring(0, start) + o + a.value.substring(start, end) + c + a.value.substring(end);
        }

        function closeModal(m) { document.getElementById('modal-' + m).style.display = 'none'; }
        function exitWithoutSave() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
