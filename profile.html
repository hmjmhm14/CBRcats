<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBRcats — Профиль персонажа</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%;
            background: #050505;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            /* Убрал overflow: hidden, чтобы можно было прокручивать страницу, если контент не влезает */
        }

        .profile-wrapper {
            width: 95vw;
            max-width: 1000px; /* Ограничил максимальную ширину для красоты */
            margin: 50px auto; /* Центрирование с отступом сверху и снизу */
            background: #000;
            border: 2px solid #ffcc00;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1);
            /* Убрал фиксированную высоту 90vh */
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .profile-header h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .exit-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            font-family: inherit;
        }
        .exit-btn:hover { background: #ff3333; color: #fff; }

        .main-content {
            display: flex;
            gap: 30px;
            /* Убрал flex: 1 и min-height: 0, чтобы блок рос вместе с контентом */
        }

        .left-col {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .avatar-box {
            width: 300px;
            height: 350px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #profile-img {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        .no-skin-text {
            color: #222;
            font-size: 0.8em;
            text-align: center;
        }

        .select-btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }
        .select-btn:hover { background: #ffaa00; }

        .menu-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-btn {
            background: #111;
            color: #888;
            border: 1px solid #222;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            font-size: 0.9em;
            transition: 0.2s;
            cursor: pointer;
        }
        
        .menu-btn.locked {
            opacity: 0.2;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .menu-btn:not(.locked):hover {
            border-color: #ffcc00;
            color: #ffcc00;
        }

        .admin-btn {
            border-color: #00ffcc !important;
            color: #00ffcc !important;
            display: none;
        }

        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #080808;
            border-left: 3px solid #ffcc00;
            border-radius: 4px;
        }

        .info-label { color: #666; font-size: 0.8em; text-transform: uppercase; }

        #edit-name {
            background: transparent;
            border: none;
            color: #ffcc00;
            text-align: right;
            font-weight: bold;
            font-family: inherit;
            outline: none;
            width: 200px;
        }

        .about-section {
            background: #080808;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Убрал flex: 1 */
        }

        .toolbar { display: flex; gap: 5px; margin-bottom: 5px; }
        .bb-btn {
            background: #151515;
            border: 1px solid #333;
            color: #777;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .bb-btn:hover { color: #ffcc00; border-color: #ffcc00; }

        .about-area {
            width: 100%;
            height: 200px; /* Задал фиксированную высоту для текстового поля */
            background: #050505;
            border: 1px solid #333;
            color: #bbb;
            padding: 15px;
            font-family: inherit;
            resize: vertical; /* Разрешил менять размер только по вертикали */
            outline: none;
            line-height: 1.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-win {
            background: #000;
            border: 2px solid #ffcc00;
            width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header class="profile-header">
            <h1 id="header-name">ЗАГРУЗКА...</h1>
            <button class="exit-btn" onclick="exitWithoutSave()">ВЫЙТИ</button>
        </header>

        <div class="main-content">
            <div class="left-col">
                <div class="avatar-box">
                    <span class="no-skin-text" id="no-skin">ОКРАС НЕ ВЫБРАН</span>
                    <img id="profile-img" src="" alt="Кот">
                </div>
                <a href="okras.html" id="btn-okras" class="select-btn">ВЫБРАТЬ ОКРАС</a>
                
                <div class="menu-btns">
                    <a href="../игровая/game.html" class="menu-btn game-link locked">ИГРОВАЯ</a>
                    <div class="menu-btn locked" onclick="openModal('chat')">ГРУППЫ / ЧАТЫ</div>
                    <div class="menu-btn locked" onclick="openModal('pm')">ЛИЧНЫЕ СООБЩЕНИЯ</div>
                    <div class="menu-btn locked" onclick="openModal('news')">НОВОСТИ</div>
                    <div class="menu-btn admin-btn" id="link-admin" onclick="openModal('admin')">АДМИН-ПАНЕЛЬ</div>
                </div>
            </div>

            <div class="right-col">
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">ID Персонажа</span>
                        <span class="info-value" id="display-id">--.--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Имя (изменяемо)</span>
                        <input type="text" id="edit-name">
                    </div>
                    <div class="info-row">
                        <span class="info-label">Статус</span>
                        <span class="info-value">Одиночки</span>
                    </div>
                </div>

                <div class="about-section">
                    <div class="toolbar">
                        <button class="bb-btn" title="Жирный" onclick="insertBB('[b]', '[/b]')">[B]</button>
                        <button class="bb-btn" title="Курсив" onclick="insertBB('[i]', '[/i]')">[I]</button>
                        <button class="bb-btn" title="Картинка" onclick="insertBB('[img]', '[/img]')">[IMG]</button>
                    </div>
                    <textarea id="edit-about" class="about-area" placeholder="Расскажите о своем герое..."></textarea>
                    <button class="select-btn" style="background: transparent; border: 1px solid #4caf50; color: #4caf50;" onclick="saveAboutData()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-admin" class="modal">
        <div class="modal-win" style="border-color: #00ffcc;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2 style="color:#00ffcc; margin:0; font-size:1em;">АДМИН-ИНСТРУМЕНТЫ</h2>
                <button class="bb-btn" onclick="closeModal('admin')">[X]</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; color:#666; font-size:0.8em;">
                <div style="border:1px solid #222; padding:10px;">
                    <p>ID ИГРОКА:</p>
                    <input type="text" id="adm-id" style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:5px;">
                    <button class="bb-btn" style="width:100%; margin-top:10px;" onclick="alert('Бан выдан')">БАН</button>
                    <button class="bb-btn" style="width:100%; margin-top:5px;" onclick="alert('Мут выдан')">МУТ</button>
                </div>
                <div style="border:1px solid #222; padding:10px;">
                    <p>ТЕЛЕПОРТАЦИЯ:</p>
                    <input type="text" placeholder="ID локации" style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:5px;">
                    <button class="bb-btn" style="width:100%; margin-top:10px;">ТЕЛЕПОРТИРОВАТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data'));

        function formatID(id) {
            if (typeof id === 'number') {
                let m = Math.floor(id / 100).toString().padStart(2, '0');
                let s = (id % 100).toString().padStart(2, '0');
                return `${m}.${s}`;
            }
            return id;
        }

        window.onload = function() {
            if (!userData) return window.location.href = '../index.html';
            userData.id = formatID(userData.id);

            document.getElementById('header-name').innerText = userData.name.toUpperCase();
            document.getElementById('display-id').innerText = userData.id;
            document.getElementById('edit-name').value = userData.name;
            document.getElementById('edit-about').value = userData.about || "";
            
            if (userData.appearance && userData.appearance !== "") {
                document.getElementById('profile-img').src = userData.appearance;
                document.getElementById('profile-img').style.display = 'block';
                document.getElementById('no-skin').style.display = 'none';
                document.getElementById('btn-okras').style.display = 'none';
                document.querySelectorAll('.menu-btn.locked').forEach(el => el.classList.remove('locked'));
                document.querySelector('.game-link').classList.remove('locked');
            }

            if (userData.id === "00.00") {
                document.getElementById('link-admin').style.display = 'block';
            }
        };

        function openModal(m) { document.getElementById('modal-' + m).style.display = 'flex'; }
        function closeModal(m) { document.getElementById('modal-' + m).style.display = 'none'; }

        function saveAboutData() {
            userData.name = document.getElementById('edit-name').value;
            userData.about = document.getElementById('edit-about').value;
            localStorage.setItem('cbrcat_user_data', JSON.stringify(userData));
            document.getElementById('header-name').innerText = userData.name.toUpperCase();
            alert("Профиль обновлен!");
        }

        function exitWithoutSave() {
            window.location.href = '../index.html';
        }

        function insertBB(o, c) {
            const a = document.getElementById('edit-about');
            a.value = a.value.substring(0, a.selectionStart) + o + a.value.substring(a.selectionStart, a.selectionEnd) + c + a.value.substring(a.selectionEnd);
        }
    </script>
</body>
</html>
