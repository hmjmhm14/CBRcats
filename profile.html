<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBRcats — Профиль персонажа</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%;
            background: #050505;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
        }

        .profile-wrapper {
            width: 95vw;
            max-width: 1000px;
            margin: 50px auto;
            background: #000;
            border: 2px solid #ffcc00;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .profile-header h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .exit-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            font-family: inherit;
        }
        .exit-btn:hover { background: #ff3333; color: #fff; }

        .main-content { display: flex; gap: 30px; }

        .left-col {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .avatar-box {
            width: 300px;
            height: 350px;
            background: #0a0a0a;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #profile-img { max-width: 100%; max-height: 100%; display: none; }

        .select-btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
            text-decoration: none;
        }

        .menu-btns { display: flex; flex-direction: column; gap: 8px; }

        .menu-btn {
            background: #111;
            color: #888;
            border: 1px solid #222;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .menu-btn.locked { opacity: 0.2; cursor: not-allowed; }
        .menu-btn:not(.locked):hover { border-color: #ffcc00; color: #ffcc00; }

        .right-col { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #080808;
            border-left: 3px solid #ffcc00;
            border-radius: 4px;
        }

        .info-label { color: #666; font-size: 0.8em; text-transform: uppercase; }

        #edit-name {
            background: transparent;
            border: none;
            color: #ffcc00;
            text-align: right;
            font-weight: bold;
            font-family: inherit;
            outline: none;
        }

        .about-section {
            background: #080808;
            border: 1px solid #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .about-area {
            width: 100%;
            height: 150px;
            background: #050505;
            border: 1px solid #333;
            color: #bbb;
            padding: 15px;
            resize: vertical;
            outline: none;
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-win {
            background: #000;
            border: 2px solid #ffcc00;
            width: 500px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .settings-input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            margin-top: 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header class="profile-header">
            <h1 id="header-name">ЗАГРУЗКА...</h1>
            <button class="exit-btn" onclick="exitWithoutSave()">ВЫЙТИ</button>
        </header>

        <div class="main-content">
            <div class="left-col">
                <div class="avatar-box">
                    <span id="no-skin" style="color:#222; font-size:0.8em;">ОКРАС НЕ ВЫБРАН</span>
                    <img id="profile-img" src="">
                </div>
                <a href="okras.html" id="btn-okras" class="select-btn">ВЫБРАТЬ ОКРАС</a>
                
                <div class="menu-btns">
                    <a href="../игровая/game.html" class="menu-btn game-link locked">ИГРОВАЯ</a>
                    <div class="menu-btn locked" onclick="openModal('settings')">НАСТРОЙКИ АККАУНТА</div>
                    <div class="menu-btn locked">ЧАТЫ</div>
                    <div class="menu-btn admin-btn" id="link-admin" style="display:none; color:#00ffcc; border-color:#00ffcc;" onclick="alert('Панель админа')">АДМИН-ПАНЕЛЬ</div>
                </div>
            </div>

            <div class="right-col">
                <div class="info-row">
                    <span class="info-label">ID Персонажа</span>
                    <span id="display-id" style="color:#ffcc00; font-weight:bold;">--.--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Имя (изменяемо)</span>
                    <input type="text" id="edit-name">
                </div>

                <div class="about-section">
                    <span class="info-label">О себе:</span>
                    <textarea id="edit-about" class="about-area"></textarea>
                    <button class="select-btn" style="background:transparent; border:1px solid #4caf50; color:#4caf50;" onclick="saveAboutData()">СОХРАНИТЬ ПРОФИЛЬ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-win">
            <h2 style="color:#ffcc00; margin:0; font-size:1.2em;">НАСТРОЙКИ</h2>
            
            <div>
                <label class="info-label">Новая почта:</label>
                <input type="email" id="set-email" class="settings-input" placeholder="example@mail.com">
            </div>

            <div>
                <label class="info-label">Новый пароль:</label>
                <input type="password" id="set-pass" class="settings-input" placeholder="********">
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="select-btn" onclick="saveSettings()">СОХРАНИТЬ</button>
                <button class="select-btn" style="background:#222; color:#fff;" onclick="closeModal('settings')">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data'));

        function formatID(id) {
            if (typeof id === 'number') {
                let m = Math.floor(id / 100).toString().padStart(2, '0');
                let s = (id % 100).toString().padStart(2, '0');
                return `${m}.${s}`;
            }
            return id;
        }

        window.onload = function() {
            if (!userData) { window.location.href = '../index.html'; return; }

            const fixedID = formatID(userData.id);
            document.getElementById('display-id').innerText = fixedID;
            document.getElementById('header-name').innerText = userData.name.toUpperCase();
            document.getElementById('edit-name').value = userData.name;
            document.getElementById('edit-about').value = userData.about || "";
            
            // Настройки
            document.getElementById('set-email').value = userData.email || "";
            document.getElementById('set-pass').value = userData.password || "";

            if (userData.appearance) {
                document.getElementById('profile-img').src = userData.appearance;
                document.getElementById('profile-img').style.display = 'block';
                document.getElementById('no-skin').style.display = 'none';
                document.getElementById('btn-okras').style.display = 'none';
                document.querySelectorAll('.menu-btn.locked').forEach(el => el.classList.remove('locked'));
                document.querySelector('.game-link').classList.remove('locked');
            }

            if (fixedID === "00.00") document.getElementById('link-admin').style.display = 'block';
        };

        function saveAboutData() {
            userData.name = document.getElementById('edit-name').value;
            userData.about = document.getElementById('edit-about').value;
            localStorage.setItem('cbrcat_user_data', JSON.stringify(userData));
            document.getElementById('header-name').innerText = userData.name.toUpperCase();
            alert("Профиль сохранен!");
        }

        function saveSettings() {
            userData.email = document.getElementById('set-email').value;
            userData.password = document.getElementById('set-pass').value;
            localStorage.setItem('cbrcat_user_data', JSON.stringify(userData));
            alert("Данные аккаунта обновлены!");
            closeModal('settings');
        }

        function openModal(m) { document.getElementById('modal-' + m).style.display = 'flex'; }
        function closeModal(m) { document.getElementById('modal-' + m).style.display = 'none'; }
        function exitWithoutSave() { window.location.href = '../index.html'; }
    </script>
</body>
</html>
