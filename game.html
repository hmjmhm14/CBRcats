<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Игровая</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #eee; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
        }

        .game-wrapper { display: flex; width: 100vw; height: 100vh; }

        .side-panel { 
            width: 280px; background: #050505; border: 1px solid #222; 
            display: flex; flex-direction: column; padding: 15px; z-index: 10;
        }

        .viewport { 
            flex: 1; position: relative; background: #0a0a0a; 
            overflow: auto; display: flex; justify-content: center; align-items: center;
        }
        
        #game-map { 
            width: 1000px; height: 1000px; background: #111; 
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px), 
                              linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px; 
            position: relative; border: 2px solid #ffcc00;
        }

        /* --- ЧАТ И ВКЛАДКИ --- */
        .chat-tabs { display: flex; gap: 2px; margin-bottom: 5px; }
        .tab-btn { 
            flex: 1; padding: 5px; background: #111; border: 1px solid #333; 
            color: #666; font-size: 0.65em; cursor: pointer; text-transform: uppercase;
        }
        .tab-btn.active { color: #ffcc00; border-color: #ffcc00; }

        .chat-area { flex: 1; display: flex; flex-direction: column; margin-top: 10px; }
        /* Уменьшенная ширина чата */
        #game-chat { 
            width: 90%; align-self: center; flex: 1; 
            background: #000; border: 1px solid #222; padding: 5px; 
            overflow-y: auto; font-size: 0.8em; margin-bottom: 5px; 
        }

        /* --- ПАРАМЕТРЫ --- */
        .stat-bar { width: 100%; height: 14px; background: #222; margin: 2px 0; border-radius: 2px; overflow: hidden; position: relative; }
        .stat-fill { height: 100%; transition: 0.5s; }
        .stat-text { position: absolute; width: 100%; text-align: center; font-size: 0.7em; color: #fff; line-height: 14px; top: 0; }

        /* --- МИНИ-ПРОФИЛЬ (ВСПЛЫВАЮЩИЙ) --- */
        #mini-profile {
            display: none; position: absolute; width: 220px; background: #000;
            border: 2px solid #ffcc00; padding: 10px; z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.8); pointer-events: auto;
        }
        .mini-avatar { width: 100%; height: 120px; background: #111; margin-bottom: 8px; border: 1px solid #222; overflow: hidden; }
        .mini-avatar img { width: 100%; height: 100%; object-fit: contain; }
        .mini-info { font-size: 0.75em; line-height: 1.4; color: #ccc; }
        .mini-info b { color: #ffcc00; }

        /* --- КОТ --- */
        #player-cat { 
            position: absolute; width: 80px; height: 80px; 
            margin-left: -40px; margin-top: -40px; cursor: pointer;
            transition: left 0.3s ease-out, top 0.3s ease-out;
        }
        #player-cat img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.2s; }

        .action-btn { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            cursor: pointer; padding: 10px; font-family: inherit; font-size: 0.75em; margin-top: 5px;
        }
        .action-btn:hover { background: #222; color: #ffcc00; }

        /* --- РЕДАКТОР ЛОКАЦИЙ --- */
        #loc-editor { display: none; margin-top: 15px; padding: 10px; border: 1px dashed #00ffcc; background: rgba(0,255,204,0.05); }
        .loc-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 5px; margin-bottom: 5px; font-size: 0.75em; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="side-panel">
            <div class="chat-tabs">
                <div class="tab-btn active">МОЙ КОТ</div>
                <div class="tab-btn">ЛС</div>
                <div class="tab-btn">ЧАТ</div>
                <div class="tab-btn">НОВОСТИ</div>
            </div>

            <div class="chat-area">
                <div id="game-chat"></div>
                <div style="display:flex; gap:2px; padding: 0 5%;">
                    <input type="text" id="chat-msg" style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:5px; font-size:0.8em;">
                    <button class="action-btn" style="width:30px; margin:0;" onclick="sendMessage()">></button>
                </div>
            </div>
            
            <button class="action-btn" style="border-color:#00ffcc; color:#00ffcc;" onclick="toggleEditor()">РЕЖИМ СОЗДАНИЯ</button>
            <div id="loc-editor">
                <div style="font-size:0.6em; color:#00ffcc; margin-bottom:5px;">СОЗДАНИЕ ЛОКАЦИИ</div>
                <input type="text" id="loc-name" class="loc-input" placeholder="Название локации">
                <input type="text" id="loc-tribe" class="loc-input" placeholder="Фракция (спавн)">
                <button class="action-btn" style="font-size:0.6em;" onclick="createNewLocation()">СОХРАНИТЬ ЛОКУ</button>
            </div>
        </div>

        <div class="viewport">
            <div id="game-map" onclick="handleMove(event)">
                <div id="player-cat" onclick="showMiniProfile(event)">
                    <img id="cat-sprite" src="" alt="Cat">
                </div>

                <div id="mini-profile">
                    <div class="mini-avatar"><img id="mini-img" src=""></div>
                    <div class="mini-info">
                        <div id="mini-name" style="font-size:1.1em; font-weight:bold; margin-bottom:5px;">ИМЯ</div>
                        <b>ID:</b> <span id="mini-id"></span><br>
                        <b>ПОЛ:</b> <span id="mini-gender"></span><br>
                        <b>ФРАКЦИЯ:</b> <span id="mini-tribe"></span><br>
                        <hr style="border:0; border-top:1px solid #222; margin:5px 0;">
                        <b>О СЕБЕ:</b><br>
                        <span id="mini-about" style="font-style:italic; font-size:0.9em;">-</span>
                    </div>
                    <button class="action-btn" onclick="document.getElementById('mini-profile').style.display='none'">ЗАКРЫТЬ</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div style="font-size:0.7em; color:#888; text-transform:uppercase; margin-bottom:5px;">СОСТОЯНИЕ</div>
            <div class="stat-bar"><div id="bar-hunger" class="stat-fill" style="background:#ffaa00; width:100%;"></div><div id="text-hunger" class="stat-text">100%</div></div>
            <div class="stat-bar"><div id="bar-thirst" class="stat-fill" style="background:#00aaff; width:100%;"></div><div id="text-thirst" class="stat-text">100%</div></div>
            <div class="stat-bar"><div id="bar-sleep" class="stat-fill" style="background:#9933ff; width:100%;"></div><div id="text-sleep" class="stat-text">100%</div></div>
            <div class="stat-bar" style="margin-top:5px; height:18px;"><div id="bar-health" class="stat-fill" style="background:#ff3333; width:100%;"></div><div id="text-health" class="stat-text" style="line-height:18px;">100%</div></div>
            
            <div id="cur-loc" style="text-align:center; color:#ffcc00; font-weight:bold; font-size:0.8em; margin:10px 0;">Лесная глушь</div>
            
            <button class="action-btn" onclick="actionLick()">УМЫТЬСЯ</button>
            <button class="action-btn" onclick="window.location.href='profile.html'">В МЕНЮ</button>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data'));
        let stats = { hunger: 100, thirst: 100, sleep: 100, health: 100 };
        let catPos = { x: 500, y: 500, flipped: false };

        window.onload = function() {
            if(!userData) { window.location.href = 'index.html'; return; }
            document.getElementById('cat-sprite').src = userData.appearance || "";
            refreshCat();
            setInterval(processDecay, 1000);
        };

        function handleMove(e) {
            const rect = document.getElementById('game-map').getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;
            
            catPos.flipped = (tx < catPos.x);
            catPos.x = tx;
            catPos.y = ty;
            refreshCat();
            // Скрываем профиль при ходьбе
            document.getElementById('mini-profile').style.display = 'none';
        }

        function refreshCat() {
            const cat = document.getElementById('player-cat');
            cat.style.left = catPos.x + 'px';
            cat.style.top = catPos.y + 'px';
            document.getElementById('cat-sprite').style.transform = catPos.flipped ? "scaleX(-1)" : "scaleX(1)";
        }

        // --- МИНИ-ПРОФИЛЬ ---
        function showMiniProfile(e) {
            e.stopPropagation();
            const mp = document.getElementById('mini-profile');
            document.getElementById('mini-img').src = userData.appearance;
            document.getElementById('mini-name').innerText = userData.name.toUpperCase();
            document.getElementById('mini-id').innerText = userData.id;
            document.getElementById('mini-gender').innerText = userData.gender || "Не указан";
            document.getElementById('mini-tribe').innerText = userData.tribe;
            document.getElementById('mini-about').innerText = userData.about || "История не написана...";
            
            mp.style.display = 'block';
            mp.style.left = (catPos.x + 50) + 'px';
            mp.style.top = (catPos.y - 100) + 'px';
        }

        // --- РЕДАКТОР ЛОКАЦИЙ ---
        function toggleEditor() {
            const ed = document.getElementById('loc-editor');
            ed.style.display = (ed.style.display === 'none') ? 'block' : 'none';
        }

        function createNewLocation() {
            const name = document.getElementById('loc-name').value;
            const tribe = document.getElementById('loc-tribe').value;
            if(!name) return alert("Введите название!");
            
            document.getElementById('cur-loc').innerText = name;
            alert(`Локация "${name}" создана! Установлен спавн для: ${tribe}`);
            logToChat(`<i>Вы перешли в новую локацию: <b>${name}</b></i>`);
            toggleEditor();
        }

        // --- ЛОГИКА ПАРАМЕТРОВ ---
        function processDecay() {
            stats.hunger -= 100/604800; 
            stats.thirst -= 100/259200;
            stats.sleep -= 100/172800;
            updateBars();
        }

        function updateBars() {
            ['hunger', 'thirst', 'sleep', 'health'].forEach(k => {
                let v = Math.max(0, stats[k]);
                document.getElementById('bar-'+k).style.width = v + '%';
                document.getElementById('text-'+k).innerText = Math.round(v) + '%';
            });
        }

        function sendMessage() {
            const i = document.getElementById('chat-msg');
            if(!i.value) return;
            logToChat(`<b>${userData.name}:</b> ${i.value}`);
            i.value = '';
        }

        function logToChat(h) {
            const c = document.getElementById('game-chat');
            c.innerHTML += `<div>${h}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        function actionLick() {
            logToChat(`<b>${userData.name}</b> умывается.`);
        }
    </script>
</body>
</html>
