<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Игровая</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #eee; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
        }

        .game-wrapper { display: flex; width: 100vw; height: 100vh; }

        /* Боковые панели */
        .side-panel { 
            width: 250px; background: #050505; border: 1px solid #222; 
            display: flex; flex-direction: column; padding: 15px; z-index: 10;
        }

        /* Центр - Игровое поле */
        .viewport { 
            flex: 1; position: relative; background: #0a0a0a; 
            overflow: auto; display: flex; justify-content: center; align-items: center;
        }
        #game-map { 
            width: 1000px; height: 1000px; background: #111; 
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px), 
                              linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px; position: relative;
        }

        /* Параметры */
        .stat-bar { width: 100%; height: 15px; background: #222; margin: 5px 0; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; transition: 0.3s; width: 100%; }
        .label { font-size: 0.7em; text-transform: uppercase; color: #888; }

        /* Чат слева */
        .chat-area { flex: 1; display: flex; flex-direction: column; margin-top: 20px; }
        #game-chat { flex: 1; background: #000; border: 1px solid #222; padding: 5px; overflow-y: auto; font-size: 0.8em; margin-bottom: 5px; }
        .chat-input-group { display: flex; gap: 2px; }
        .chat-input-group input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 5px; outline: none; }
        .bb-btn { background: #222; border: 1px solid #444; color: #888; cursor: pointer; padding: 2px 5px; font-size: 0.7em; }

        /* Кот */
        #player-cat { 
            position: absolute; width: 40px; height: 40px; 
            transition: left 0.2s, top 0.2s; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        #player-cat img { width: 100%; height: 100%; }

        /* Админ-панель */
        #admin-tool { 
            margin-top: 20px; padding: 10px; border: 1px dashed #ff3333; display: none; 
        }

        /* Статусы здоровья */
        .dead { opacity: 0.5; filter: grayscale(1); }
        .void { opacity: 0.2; filter: invert(1); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="side-panel">
            <div class="label">Навыки</div>
            <div style="font-size: 0.8em; color: #ffcc00;">Охота: 1 | Бой: 1</div>
            
            <div class="chat-area">
                <div class="label">Игровой чат</div>
                <div id="game-chat"></div>
                <div class="toolbar" style="margin-bottom: 2px;">
                    <button class="bb-btn" onclick="addBB('[b]')">B</button>
                    <button class="bb-btn" onclick="addBB('[i]')">I</button>
                </div>
                <div class="chat-input-group">
                    <input type="text" id="chat-msg" placeholder="Сказать...">
                    <button class="bb-btn" onclick="sendMessage()">></button>
                </div>
            </div>
        </div>

        <div class="viewport">
            <div id="game-map" onclick="handleMove(event)" ondblclick="handleRotate(event)">
                <div id="player-cat">
                    <img id="cat-sprite" src="" alt="Cat">
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="label">Состояние</div>
            <div class="label">Голод</div>
            <div class="stat-bar"><div id="bar-hunger" class="stat-fill" style="background: #ffaa00;"></div></div>
            <div class="label">Жажда</div>
            <div class="stat-bar"><div id="bar-thirst" class="stat-fill" style="background: #00aaff;"></div></div>
            <div class="label">Чистота</div>
            <div class="stat-bar"><div id="bar-clean" class="stat-fill" style="background: #ffffff;"></div></div>
            <div class="label">Здоровье</div>
            <div class="stat-bar"><div id="bar-health" class="stat-fill" style="background: #ff3333;"></div></div>
            <div id="location-name" style="font-size: 0.7em; color: #555; text-align: center; margin-top: 5px;">Мир живых</div>

            <div style="margin-top: 30px;">
                <div class="label">Действия</div>
                <button class="select-btn" onclick="actionLick()" style="width:100%; background:#222; border:1px solid #444; color:#fff; cursor:pointer; padding:10px;">ВЫЛИЗЫВАНИЕ</button>
            </div>

            <div id="admin-tool">
                <div class="label" style="color: #ff3333;">Admin Control</div>
                <input type="text" id="target-id" placeholder="ID игрока" class="bb-btn" style="width: 100%; margin-bottom: 5px;">
                <input type="text" id="new-model" placeholder="URL модельки" class="bb-btn" style="width: 100%;">
                <button class="bb-btn" style="width: 100%; margin-top: 5px;" onclick="adminChangeModel()">СМЕНИТЬ ВИД</button>
            </div>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data')) || { id: "99.99", name: "Guest", tribe: "Одиночка" };
        
        // Параметры
        let stats = {
            hunger: 100, thirst: 100, clean: 100, health: 100, karma: 0
        };

        // Координаты
        let catPos = { x: 500, y: 500, rotation: 0 };

        window.onload = function() {
            // Установка окраса
            if(userData.appearance) {
                document.getElementById('cat-sprite').src = userData.appearance;
            }
            
            // Проверка админа
            if(userData.id === "00.00") {
                document.getElementById('admin-tool').style.display = 'block';
            }

            // Запуск циклов
            setInterval(decayStats, 5000); // Для теста быстрее (раз в 5 сек)
            updateBars();
            refreshCat();
        };

        // ДВИЖЕНИЕ
        function handleMove(e) {
            if(stats.health <= 0 && stats.health > -100) return; // Мертвые ходят по своим правилам (здесь можно добавить переход)
            
            const rect = document.getElementById('game-map').getBoundingClientRect();
            catPos.x = e.clientX - rect.left - 20;
            catPos.y = e.clientY - rect.top - 20;
            refreshCat();
        }

        function handleRotate(e) {
            catPos.rotation += 90;
            if(catPos.rotation >= 360) catPos.rotation = 0;
            refreshCat();
        }

        function refreshCat() {
            const cat = document.getElementById('player-cat');
            cat.style.left = catPos.x + 'px';
            cat.style.top = catPos.y + 'px';
            cat.style.transform = `rotate(${catPos.rotation}deg)`;
        }

        // ПАРАМЕТРЫ
        function decayStats() {
            // Голод и жажда (имитация раз в день - здесь раз в цикл)
            stats.hunger -= 2;
            stats.thirst -= 3;
            // Чистота (рандом -1 или -5)
            stats.clean -= (Math.random() > 0.5 ? 1 : 5);

            if(stats.hunger < 0) stats.hunger = 0;
            if(stats.thirst < 0) stats.thirst = 0;
            if(stats.clean < 0) stats.clean = 0;

            // Если голод или жажда 0 - падает здоровье
            if(stats.hunger <= 0 || stats.thirst <= 0) stats.health -= 5;

            checkLifeStatus();
            updateBars();
        }

        function checkLifeStatus() {
            const sprite = document.getElementById('cat-sprite');
            const loc = document.getElementById('location-name');

            if(stats.health <= 0 && stats.health > -100) {
                // СМЕРТЬ 1 (ЗП или СЛ)
                sprite.className = 'dead';
                loc.innerText = (stats.karma >= 0) ? "Звездное племя" : "Сумрачный лес";
                if(stats.health === 0) logToChat("<i>Вы чувствуете холод... ваши лапы ведут вас в мир теней.</i>");
            } else if (stats.health <= -100) {
                // СМЕРТЬ 2 (Пустозведье)
                sprite.className = 'void';
                loc.innerText = "Пустозведье";
                logToChat("<b style='color:red'>Вы стерты из памяти племен.</b>");
            } else {
                sprite.className = '';
                loc.innerText = "Мир живых";
            }
        }

        function updateBars() {
            document.getElementById('bar-hunger').style.width = stats.hunger + '%';
            document.getElementById('bar-thirst').style.width = stats.thirst + '%';
            document.getElementById('bar-clean').style.width = stats.clean + '%';
            document.getElementById('bar-health').style.width = Math.abs(stats.health) + '%';
        }

        // ДЕЙСТВИЯ
        function actionLick() {
            if(stats.health <= 0) return alert("Мертвые не могут умываться!");
            stats.clean += 15;
            if(stats.clean > 100) stats.clean = 100;
            logToChat(`<b>${userData.name}</b> тщательно вылизывает свою шерстку.`);
            updateBars();
        }

        // ЧАТ
        function sendMessage() {
            const inp = document.getElementById('chat-msg');
            if(!inp.value) return;
            let text = inp.value;
            // Простейшая замена BB-кодов
            text = text.replace(/\[b\](.*?)\[\/b\]/g, '<b>$1</b>');
            text = text.replace(/\[i\](.*?)\[\/i\]/g, '<i>$1</i>');
            
            logToChat(`<b>${userData.name}:</b> ${text}`);
            inp.value = '';
        }

        function logToChat(html) {
            const chat = document.getElementById('game-chat');
            chat.innerHTML += `<div>${html}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function addBB(code) {
            document.getElementById('chat-msg').value += code;
        }

        // АДМИН
        function adminChangeModel() {
            const target = document.getElementById('target-id').value;
            const modelUrl = document.getElementById('new-model').value;
            // В мультиплеере тут был бы запрос к БД, сейчас меняем себе для теста
            if(target === userData.id || target === "") {
                document.getElementById('cat-sprite').src = modelUrl;
                logToChat("<span style='color:red'>[СИСТЕМА] Модель изменена администратором.</span>");
            }
        }
    </script>
</body>
</html>
