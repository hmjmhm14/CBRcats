<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CBRcats — Игровая</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #eee; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
        }

        .game-wrapper { display: flex; width: 100vw; height: 100vh; }

        /* Боковые панели */
        .side-panel { 
            width: 280px; background: #050505; border: 1px solid #222; 
            display: flex; flex-direction: column; padding: 15px; z-index: 10;
        }

        /* Игровое поле */
        .viewport { 
            flex: 1; position: relative; background: #0a0a0a; 
            overflow: auto; display: flex; justify-content: center; align-items: center;
        }
        
        #game-map { 
            width: 1000px; height: 1000px; background: #111; 
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px), 
                              linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px; 
            position: relative;
            border: 2px solid #ffcc00; /* Желтая граница */
        }

        /* Параметры */
        .stat-group { margin-bottom: 8px; }
        .stat-bar { width: 100%; height: 18px; background: #222; margin: 2px 0; border-radius: 3px; overflow: hidden; position: relative; border: 1px solid #333; }
        .stat-fill { height: 100%; transition: 0.5s; width: 100%; }
        .stat-text { position: absolute; width: 100%; text-align: center; font-size: 0.75em; color: #fff; line-height: 16px; font-weight: bold; top: 0; left: 0; text-shadow: 1px 1px 1px #000; }
        .label { font-size: 0.7em; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        /* Чат */
        .chat-area { flex: 1; display: flex; flex-direction: column; margin-top: 20px; }
        #game-chat { flex: 1; background: #000; border: 1px solid #222; padding: 5px; overflow-y: auto; font-size: 0.8em; margin-bottom: 5px; color: #bbb; }
        #game-chat b { color: #ffcc00; }
        .chat-input-group { display: flex; gap: 2px; }
        .chat-input-group input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 8px; outline: none; font-family: inherit; }

        /* Кот (Увеличенная моделька) */
        #player-cat { 
            position: absolute; 
            width: 80px; height: 80px; 
            transition: left 0.3s ease-out, top 0.3s ease-out, transform 0.2s ease-out; 
            pointer-events: none;
            display: flex; justify-content: center; align-items: center;
            margin-left: -40px; margin-top: -40px; 
        }
        #player-cat img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Кнопки */
        .action-btn { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            cursor: pointer; padding: 12px; font-family: inherit; font-weight: bold;
            transition: 0.2s; text-transform: uppercase; font-size: 0.8em;
        }
        .action-btn:hover { background: #ffcc00; color: #000; }
        .bb-btn { background: #222; border: 1px solid #444; color: #888; cursor: pointer; padding: 4px 8px; font-size: 0.7em; }

        /* Статусы смерти */
        .dead { opacity: 0.5; filter: grayscale(1); }
        .void { opacity: 0.2; filter: invert(1) blur(1px); }

        #admin-tool { margin-top: 20px; padding: 10px; border: 1px dashed #ff3333; display: none; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="side-panel">
            <div class="label">Навыки</div>
            <div style="font-size: 0.8em; color: #ffcc00; margin-bottom: 15px;">Охота: 1 | Бой: 1</div>
            
            <div class="chat-area">
                <div class="label">Чат (BB-коды разрешены)</div>
                <div id="game-chat"></div>
                <div class="chat-input-group">
                    <input type="text" id="chat-msg" placeholder="Введите сообщение...">
                    <button class="bb-btn" onclick="sendMessage()">></button>
                </div>
            </div>
        </div>

        <div class="viewport">
            <div id="game-map" onclick="handleMove(event)">
                <div id="player-cat">
                    <img id="cat-sprite" src="" alt="Cat">
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="label">Параметры</div>
            
            <div class="stat-group">
                <div class="label">Голод (на 7 дней)</div>
                <div class="stat-bar">
                    <div id="bar-hunger" class="stat-fill" style="background: #ffaa00;"></div>
                    <div id="text-hunger" class="stat-text">100%</div>
                </div>
            </div>
            
            <div class="stat-group">
                <div class="label">Жажда (на 3 дня)</div>
                <div class="stat-bar">
                    <div id="bar-thirst" class="stat-fill" style="background: #00aaff;"></div>
                    <div id="text-thirst" class="stat-text">100%</div>
                </div>
            </div>
            
            <div class="stat-group">
                <div class="label">Чистота (рандом)</div>
                <div class="stat-bar">
                    <div id="bar-clean" class="stat-fill" style="background: #ffffff;"></div>
                    <div id="text-clean" class="stat-text">100%</div>
                </div>
            </div>

            <div class="stat-group">
                <div class="label">Сонливость (раз в 2 дня)</div>
                <div class="stat-bar">
                    <div id="bar-sleep" class="stat-fill" style="background: #9933ff;"></div>
                    <div id="text-sleep" class="stat-text">100%</div>
                </div>
            </div>
            
            <div class="stat-group">
                <div class="label">Здоровье</div>
                <div class="stat-bar">
                    <div id="bar-health" class="stat-fill" style="background: #ff3333;"></div>
                    <div id="text-health" class="stat-text">100%</div>
                </div>
            </div>
            
            <div id="location-name" style="font-size: 0.8em; color: #ffcc00; text-align: center; margin: 10px 0; font-weight: bold;">Мир живых</div>

            <div style="margin-top: 20px;">
                <button class="action-btn" onclick="actionLick()">ВЫЛИЗЫВАНИЕ</button>
            </div>

            <div id="admin-tool">
                <div class="label" style="color: #ff3333;">Admin ID: 00.00</div>
                <input type="text" id="target-id" placeholder="ID игрока" style="width:100%; margin-bottom:5px; background:#111; color:#fff; border:1px solid #333;">
                <input type="text" id="new-model" placeholder="URL картинки" style="width:100%; background:#111; color:#fff; border:1px solid #333;">
                <button class="bb-btn" style="width:100%; margin-top:5px;" onclick="adminChangeModel()">СМЕНИТЬ МОДЕЛЬ</button>
            </div>
        </div>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('cbrcat_user_data')) || { id: "99.99", name: "Кот", appearance: "" };
        let stats = { hunger: 100, thirst: 100, clean: 100, sleep: 100, health: 100, karma: 0 };
        let catPos = { x: 500, y: 500, rotation: 0 };

        window.onload = function() {
            if(userData.appearance) document.getElementById('cat-sprite').src = userData.appearance;
            if(userData.id === "00.00") document.getElementById('admin-tool').style.display = 'block';
            
            // Запуск реального времени
            setInterval(processRealTime, 1000);
            updateBars();
            refreshCat();
        };

        // --- ДВИЖЕНИЕ И ПОВОРОТ ПО МЫШКЕ ---
        function handleMove(e) {
            if(stats.health <= -100) return;
            const rect = document.getElementById('game-map').getBoundingClientRect();
            const targetX = e.clientX - rect.left;
            const targetY = e.clientY - rect.top;

            // Расчет угла поворота к мышке
            const deltaX = targetX - catPos.x;
            const deltaY = targetY - catPos.y;
            const angle = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
            
            catPos.x = targetX;
            catPos.y = targetY;
            catPos.rotation = angle + 90; // +90 т.к. спрайт смотрит вверх

            refreshCat();
        }

        function refreshCat() {
            const cat = document.getElementById('player-cat');
            cat.style.left = catPos.x + 'px';
            cat.style.top = catPos.y + 'px';
            cat.style.transform = `rotate(${catPos.rotation}deg)`;
        }

        // --- ЛОГИКА ПАРАМЕТРОВ (РЕАЛЬНОЕ ВРЕМЯ) ---
        function processRealTime() {
            // Голод: -14% в день (~0.00016% в сек)
            stats.hunger -= (Math.random() * (5 - 1) + 1) / 86400 * 5; 
            // Жажда: -33% в день (~0.00038% в сек)
            stats.thirst -= (Math.random() * (5 - 1) + 1) / 25920; 
            // Чистота: рандомный спад
            stats.clean -= (Math.random() * 5) / 86400;
            // Сонливость: -50% в день
            stats.sleep -= 2 / 172800 * 100;

            if(stats.hunger <= 0 || stats.thirst <= 0) stats.health -= 0.01;

            checkHealthStatus();
            updateBars();
        }

        function checkHealthStatus() {
            const sprite = document.getElementById('cat-sprite');
            const loc = document.getElementById('location-name');

            if(stats.health <= 0 && stats.health > -100) {
                sprite.className = 'dead';
                loc.innerText = (stats.karma >= 0) ? "Звездное Племя" : "Сумрачный Лес";
            } else if(stats.health <= -100) {
                sprite.className = 'void';
                loc.innerText = "Пустозведье";
            } else {
                sprite.className = '';
                loc.innerText = "Мир живых";
            }
        }

        function updateBars() {
            const keys = ['hunger', 'thirst', 'clean', 'sleep', 'health'];
            keys.forEach(key => {
                let val = Math.max(0, Math.min(100, Math.abs(stats[key])));
                document.getElementById('bar-' + key).style.width = val + '%';
                document.getElementById('text-' + key).innerText = Math.round(val) + '%';
            });
        }

        // --- ДЕЙСТВИЯ ---
        function actionLick() {
            if(stats.health <= 0) return;
            stats.clean = Math.min(100, stats.clean + 15);
            logToChat(`<b>${userData.name}</b> вылизывается.`);
            updateBars();
        }

        function sendMessage() {
            const inp = document.getElementById('chat-msg');
            if(!inp.value) return;
            let t = inp.value.replace(/\[b\](.*?)\[\/b\]/g, '<b>$1</b>');
            logToChat(`<b>${userData.name}:</b> ${t}`);
            inp.value = '';
        }

        function logToChat(h) {
            const c = document.getElementById('game-chat');
            c.innerHTML += `<div>${h}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        function adminChangeModel() {
            const url = document.getElementById('new-model').value;
            if(url) {
                document.getElementById('cat-sprite').src = url;
                logToChat("<b style='color:red'>Модель изменена.</b>");
            }
        }
    </script>
</body>
</html>
