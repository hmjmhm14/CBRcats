<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBRcats — Игровая</title>
    
    <script>
        const userData = JSON.parse(localStorage.getItem('cbrcat_user_data'));
        // Если нет данных или окрас не выбран — доступ закрыт
        if (!userData || !userData.isReady) {
            alert("Доступ запрещен! Сначала создайте персонажа в профиле.");
            window.location.href = '../Профиль/profile.html';
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050505; color: #e0e0e0;
            font-family: 'Arial', sans-serif;
        }

        .app-container {
            display: flex;
            width: 100vw; height: 100vh;
            padding: 10px; gap: 10px;
        }

        .side-panel {
            flex: 0 0 250px;
            background: #000;
            border: 2px solid #ffcc00;
            border-radius: 10px;
            padding: 15px;
            display: flex; flex-direction: column;
        }

        /* Окно персонажа в игре */
        .game-avatar-box {
            width: 100%; height: 200px;
            background: #0a0a0a; border: 1px solid #222;
            margin-bottom: 15px; display: flex;
            justify-content: center; align-items: center;
        }
        #game-cat-img { max-width: 100%; max-height: 100%; }

        .game-viewport {
            flex: 1;
            background: #000;
            border: 2px solid #333;
            border-radius: 10px;
            position: relative;
            overflow: hidden; /* Здесь будет карта 1000x1000 */
        }

        #game-canvas {
            width: 1000px; height: 1000px;
            background-image: 
                linear-gradient(#111 1px, transparent 1px),
                linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute;
        }

        h3 { color: #ffcc00; font-size: 0.9em; text-transform: uppercase; margin: 10px 0; }

        .bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 5px 0 15px; overflow: hidden; }
        .progress { height: 100%; transition: 0.3s; }

        .action-btn {
            background: #111; color: #ccc; border: 1px solid #333;
            padding: 10px; margin-bottom: 5px; cursor: pointer;
            text-align: left; transition: 0.2s;
        }
        .action-btn:hover { border-color: #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="side-panel">
            <div class="game-avatar-box">
                <img id="game-cat-img" src="" alt="Ваш персонаж">
            </div>
            
            <h3 id="game-cat-name">ЗАГРУЗКА...</h3>
            <div style="font-size: 0.8em; color: #666; margin-bottom: 10px;">ID: <span id="game-cat-id">00.00</span></div>

            <div class="stats">
                Здоровье <div class="bar"><div class="progress" style="width: 100%; background: #f33;"></div></div>
                Энергия <div class="bar"><div class="progress" style="width: 80%; background: #ffcc00;"></div></div>
                Сытость <div class="bar"><div class="progress" style="width: 60%; background: #4caf50;"></div></div>
            </div>
        </aside>

        <main class="game-viewport">
            <div id="game-canvas">
                </div>
        </main>

        <aside class="side-panel">
            <h3>Действия</h3>
            <button class="action-btn">Осмотреться</button>
            <button class="action-btn">Искать еду</button>
            <button class="action-btn">Подать голос</button>
            
            <button class="action-btn" onclick="location.href='../Профиль/profile.html'" style="margin-top: auto; color: #ff3333; border-color: #400;">ВЕРНУТЬСЯ В ПРОФИЛЬ</button>
        </aside>
    </div>

    <script>
        // Загружаем данные персонажа в интерфейс игры
        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('cbrcat_user_data'));
            if (data) {
                document.getElementById('game-cat-img').src = data.appearance;
                document.getElementById('game-cat-name').textContent = data.name.toUpperCase();
                document.getElementById('game-cat-id').textContent = data.id;
            }
        };

        // Базовая логика камеры (центрирование на персонаже)
        const canvas = document.getElementById('game-canvas');
        let posX = 500;
        let posY = 500;

        // В будущем здесь будет код движения персонажа по сетке
    </script>
</body>
</html>
